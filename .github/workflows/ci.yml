name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -f infra/docker/Dockerfile -t eventops-api .
      - name: Run tests in container
        run: docker run --rm eventops-api pytest